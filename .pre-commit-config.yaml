repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        priority: 0
      - id: check-json
        exclude: ^(apps/web/.*tsconfig.*\.json|\.vscode/.*\.json|packages/cli/.*tsconfig.*\.json)$
        priority: 0
      - id: check-toml
        priority: 0
      - id: check-merge-conflict
        priority: 0
      - id: check-added-large-files
        exclude: ^(mcp\.txt|pnpm-lock\.yaml|apps/web/pnpm-lock\.yaml|apps/api/uv.lock|uv.lock|apps/web/public/|.*\.(png|jpg|jpeg|gif|webp|svg)|.*/i18n/.*\.json)$
        priority: 0
      - id: check-ast
        exclude: ^(mcp\.txt|apps/web/pnpm-lock\.yaml|apps/api/uv.lock)$
        priority: 0
      - id: check-docstring-first
        priority: 0
      - id: check-case-conflict
        priority: 0
      - id: detect-private-key
        priority: 0

  - repo: local
    hooks:
      - id: biome-check
        name: Biome check (lint + format + imports)
        entry: npx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true
        language: system
        files: \.(js|jsx|ts|tsx|json|css|html)$
        exclude: ^(apps/api/|apps/voice-agent/|infra/|docs/)

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        exclude: ^(pnpm-lock\.yaml|apps/web/pnpm-lock\.yaml|.*\.env\.example|docs/configuration/environment-variables\.mdx|docs/configuration/environment-variables\.mdx|nx\.json|\.github/workflows/build\.yml|apps/api/pyproject\.toml)$
        priority: 0
