name: gaia-selfhost

services:
  # ─── Infrastructure ───

  chromadb:
    image: chromadb/chroma:1.5.1
    container_name: chromadb
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - PERSIST_DIRECTORY=/chroma/chroma
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
    ports:
      - "${CHROMADB_HOST_PORT:-8080}:8000"
    restart: on-failure
    healthcheck:
      test:
        ["CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres # pragma: allowlist secret
      POSTGRES_DB: langgraph
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    restart: on-failure
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  redis:
    image: redis:8-alpine
    container_name: redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  mongo:
    image: mongo:8
    container_name: mongo
    volumes:
      - mongo_data:/data/db
    restart: on-failure
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  rabbitmq:
    image: rabbitmq:4.1.8-management
    container_name: rabbitmq
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  # ─── Application ───

  gaia-backend:
    container_name: gaia-backend
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../apps/api/.env
    environment:
      PYTHONUNBUFFERED: 1
      FORCE_COLOR: 1
      WORKER_TYPE: main_app
      PYTHONPATH: /app/apps/api
      # Where the host-side JuiceFS sidecar mounts. The storage layer reads
      # this to locate the mount; it must match the mountpoint inside the
      # container. JuiceFS itself only mounts when an object store + meta DB
      # are configured (R2_*/JUICEFS_META_URL_TEMPLATE in .env) — otherwise
      # workspace v2 features soft-fail with JuiceFSUnavailable.
      JUICEFS_HOST_MOUNT_PATH: /mnt/jfs
      # JuiceFS is a FUSE mount; E2B's inotify watcher cannot watch a FUSE
      # filesystem, so artifact detection must tail the JuiceFS .accesslog.
      ARTIFACT_DETECTION_MODE: accesslog
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    # JuiceFS mounts via FUSE inside the container, which requires the mount
    # capability (SYS_ADMIN), the FUSE device, and — on Ubuntu/Debian hosts —
    # an unconfined AppArmor profile (the default docker profile denies mount
    # even with the capability). Docker Desktop on macOS/Windows supplies
    # /dev/fuse from its Linux VM, so this works cross-platform.
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    security_opt:
      - apparmor:unconfined
    volumes:
      # Persist JuiceFS's local chunk cache so reads don't re-fetch from the
      # object store on every restart.
      - juicefs_cache:/var/cache/juicefs
    restart: on-failure
    tty: true
    stdin_open: true
    depends_on:
      chromadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gaia_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  gaia-web:
    container_name: gaia-web
    image: ${GAIA_WEB_IMAGE:-ghcr.io/theexperiencecompany/gaia-web:latest}
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1/}
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    restart: on-failure
    depends_on:
      gaia-backend:
        condition: service_healthy
    networks:
      - gaia_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5

  arq_worker:
    container_name: arq_worker
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../apps/api/.env
    environment:
      WORKER_TYPE: arq_worker
      PYTHONPATH: /app/apps/api
      # Session/sandbox background tasks touch the workspace, so the worker
      # needs the same JuiceFS mount as the backend.
      JUICEFS_HOST_MOUNT_PATH: /mnt/jfs
      ARTIFACT_DETECTION_MODE: accesslog
    # Python deps are installed system-wide via UV_PROJECT_ENVIRONMENT=/usr/local
    # in the API Dockerfile, so call python directly. `uv run` would try to
    # rewrite /app/uv.lock and fail (Permission denied) under the non-root
    # appuser the runtime image switches to.
    command: ["python", "-m", "arq", "app.worker.WorkerSettings"]
    restart: always
    # Same FUSE requirements as gaia-backend (see that service for details).
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    security_opt:
      - apparmor:unconfined
    volumes:
      - juicefs_cache:/var/cache/juicefs
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - gaia_network

  seed-models:
    container_name: seed-models
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../apps/api/.env
    environment:
      PYTHONPATH: /app/apps/api
    # Same reason as arq_worker: drop the `uv run` wrapper so we don't hit
    # the Permission denied on /app/uv.lock as appuser.
    command: ["python", "scripts/seed_models.py", "--force"]
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"
    networks:
      - gaia_network

volumes:
  chroma_data:
  pgdata:
  redis_data:
  mongo_data:
  rabbitmq_data:
  juicefs_cache:

networks:
  gaia_network:
    driver: bridge
