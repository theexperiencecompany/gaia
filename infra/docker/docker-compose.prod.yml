# This file is used for both:
#   docker compose    — manual ops on the VM (env_file is read, secrets are skipped)
#   docker stack deploy — CI-driven Swarm deploys (env_file is ignored, secrets are used)
#
# Secret injection is handled by scripts/docker-entrypoint.sh, baked into each image.
# The entrypoint reads /run/secrets/* files and exports them as env vars before exec.

secrets:
  gaia_infisical_token:
    external: true
  gaia_infisical_machine_identity_client_id:
    external: true
  gaia_infisical_machine_identity_client_secret:
    external: true
  gaia_infisical_project_id:
    external: true
  gaia_metrics_token:
    external: true

services:
  # ---------------------------------------------------------------------------
  # API
  # ---------------------------------------------------------------------------

  gaia-backend:
    image: ghcr.io/theexperiencecompany/gaia:latest
    container_name: gaia-backend
    working_dir: /app/apps/api
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 80 --no-access-log --workers 2 --timeout-keep-alive 65 --timeout-graceful-shutdown 30 --h11-max-incomplete-event-size 16777216
    environment:
      PYTHONUNBUFFERED: "1"
      FORCE_COLOR: "0"
      WORKER_TYPE: main_app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPATH: /app/apps/api
      PYTHONIOENCODING: utf-8
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
      ENV: production
      INFISICAL_ENV: prod
    env_file:
      - ../../apps/api/.env
    secrets:
      - gaia_infisical_token
      - gaia_infisical_machine_identity_client_id
      - gaia_infisical_machine_identity_client_secret
      - gaia_infisical_project_id
      - gaia_metrics_token
    ports:
      - "8000:80"
    networks:
      gaia-prod-shared:
        aliases:
          - gaia-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      - chromadb
      - postgres
      - rabbitmq
      - redis
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
        monitor: 45s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 4G
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------------------------------------
  # ARQ Worker
  # ---------------------------------------------------------------------------

  arq_worker:
    image: ghcr.io/theexperiencecompany/gaia:latest
    container_name: arq_worker
    working_dir: /app/apps/api
    command: python -m arq app.worker.WorkerSettings
    environment:
      WORKER_TYPE: arq_worker
      PYTHONPATH: /app/apps/api
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
      ARQ_METRICS_PORT: "9100"
      ENV: production
      INFISICAL_ENV: prod
    env_file:
      - ../../apps/api/.env
    secrets:
      - gaia_infisical_token
      - gaia_infisical_machine_identity_client_id
      - gaia_infisical_machine_identity_client_secret
      - gaia_infisical_project_id
      - gaia_metrics_token
    networks:
      gaia-prod-shared:
        aliases:
          - arq_worker
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('redis', 6379), timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      - redis
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
        monitor: 45s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 2G
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------------------------------------
  # Bots
  # ---------------------------------------------------------------------------

  discord-bot:
    image: ghcr.io/theexperiencecompany/gaia-bot-discord:latest
    container_name: discord-bot
    environment:
      BOT_SERVER_PORT: "3200"
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
      ENV: production
      INFISICAL_ENV: prod
    env_file:
      - ../../apps/bots/.env
    secrets:
      - gaia_infisical_token
      - gaia_infisical_machine_identity_client_id
      - gaia_infisical_machine_identity_client_secret
      - gaia_infisical_project_id
    ports:
      - "3200:3200"
    networks:
      gaia-prod-shared:
        aliases:
          - discord-bot
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3200/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - gaia-backend
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  slack-bot:
    image: ghcr.io/theexperiencecompany/gaia-bot-slack:latest
    container_name: slack-bot
    environment:
      BOT_SERVER_PORT: "3201"
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
      ENV: production
      INFISICAL_ENV: prod
    env_file:
      - ../../apps/bots/.env
    secrets:
      - gaia_infisical_token
      - gaia_infisical_machine_identity_client_id
      - gaia_infisical_machine_identity_client_secret
      - gaia_infisical_project_id
    ports:
      - "3201:3201"
    networks:
      gaia-prod-shared:
        aliases:
          - slack-bot
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3201/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - gaia-backend
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  telegram-bot:
    image: ghcr.io/theexperiencecompany/gaia-bot-telegram:latest
    container_name: telegram-bot
    environment:
      BOT_SERVER_PORT: "3202"
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
      ENV: production
      INFISICAL_ENV: prod
    env_file:
      - ../../apps/bots/.env
    secrets:
      - gaia_infisical_token
      - gaia_infisical_machine_identity_client_id
      - gaia_infisical_machine_identity_client_secret
      - gaia_infisical_project_id
    ports:
      - "3202:3202"
    networks:
      gaia-prod-shared:
        aliases:
          - telegram-bot
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3202/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - gaia-backend
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  whatsapp-bot:
    image: ghcr.io/theexperiencecompany/gaia-bot-whatsapp:latest
    container_name: whatsapp-bot
    environment:
      BOT_SERVER_PORT: "3203"
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
      ENV: production
      INFISICAL_ENV: prod
    env_file:
      - ../../apps/bots/.env
    secrets:
      - gaia_infisical_token
      - gaia_infisical_machine_identity_client_id
      - gaia_infisical_machine_identity_client_secret
      - gaia_infisical_project_id
    ports:
      - "3203:3203"
    networks:
      gaia-prod-shared:
        aliases:
          - whatsapp-bot
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3203/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - gaia-backend
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  chromadb:
    image: chromadb/chroma:1.5.1
    container_name: chromadb
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      PERSIST_DIRECTORY: /chroma/chroma
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_PORT: "8000"
    ports:
      - "8080:8000"
    networks:
      gaia-prod-shared:
        aliases:
          - chromadb
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres # pragma: allowlist secret
      POSTGRES_DB: langgraph
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      gaia-prod-shared:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  redis:
    image: redis:8-alpine
    container_name: redis
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      gaia-prod-shared:
        aliases:
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  rabbitmq:
    image: rabbitmq:4.1.8-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./observability/rabbitmq-enabled-plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      gaia-prod-shared:
        aliases:
          - rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------------------------------------
  # Metrics exporters
  # ---------------------------------------------------------------------------

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.0
    container_name: postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/langgraph?sslmode=disable" # pragma: allowlist secret
    networks:
      - gaia-prod-shared
    depends_on:
      - postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  redis_exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: redis_exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
    networks:
      - gaia-prod-shared
    depends_on:
      - redis
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.54.1
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - "--docker_only=true"
      - "--housekeeping_interval=30s"
    networks:
      - gaia-prod-shared
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
      placement:
        constraints:
          - node.role == manager

  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node_exporter
    pid: host
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    networks:
      - gaia-prod-shared
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9100/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  blackbox_exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox_exporter
    volumes:
      - ./observability/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - gaia-prod-shared
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observability/metrics_token:/etc/prometheus/metrics_token:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - gaia-prod-shared
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------------------------------------
  # Observability — Loki + Promtail + Grafana
  # ---------------------------------------------------------------------------

  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:${LOKI_HOST_PORT:-3100}:3100"
    networks:
      gaia-prod-shared:
        aliases:
          - loki
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
      placement:
        constraints:
          - node.role == manager

  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    user: root
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      - promtail_positions:/tmp
    command: -config.file=/etc/promtail/config.yaml -config.expand-env=true
    environment:
      LOKI_PUSH_URL: ${LOKI_PUSH_URL:-http://loki:3100/loki/api/v1/push}
    networks:
      - gaia-prod-shared
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9080' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - loki
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
      placement:
        constraints:
          - node.role == manager

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "${GRAFANA_HOST_PORT:-4000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:4000}
      SLACK_ALERT_WEBHOOK_URL: ${SLACK_ALERT_WEBHOOK_URL:-https://hooks.slack.com/services/PLACEHOLDER}
      SLACK_ALERT_CHANNEL: ${SLACK_ALERT_CHANNEL:-#alerts}
    env_file:
      - .env
    networks:
      - gaia-prod-shared
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - loki
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------------------------------------
  # Voice agent (deploy manually or via separate workflow — not part of hot path)
  # ---------------------------------------------------------------------------

  voice-agent-worker:
    image: ghcr.io/theexperiencecompany/gaia-voice-agent:latest
    container_name: voice-agent-worker
    working_dir: /app/apps/voice-agent
    environment:
      PYTHONUNBUFFERED: "1"
      FORCE_COLOR: "1"
      WORKER_TYPE: voice_agent_worker
      PYTHONDONTWRITEBYTECODE: "1"
      HF_HUB_OFFLINE: "1"
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      HF_HUB_DISABLE_SYMLINKS_WARNING: "1"
    env_file:
      - ../../apps/api/.env
    volumes:
      - voice_agent_models:/home/appuser/.cache/huggingface
    networks:
      - gaia-prod-shared
    depends_on:
      - gaia-backend
    deploy:
      # replicas: 0 — not started by default; scale up manually when needed:
      #   docker --context gaia-prod service scale gaia-prod_voice-agent-worker=1
      replicas: 0
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

volumes:
  chroma_data:
  pgdata:
  redis_data:
  rabbitmq_data:
  voice_agent_models:
  loki_data:
  grafana_data:
  prometheus_data:
  promtail_positions:

networks:
  gaia-prod-shared:
    external: true
    name: gaia-prod-shared
