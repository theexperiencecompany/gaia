name: gaia-prod

services:
  # FastAPI Application
  gaia-backend:
    container_name: gaia-backend
    image: ghcr.io/theexperiencecompany/gaia:latest
    working_dir: /app/apps/api
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "80",
        "--no-access-log",
        "--workers",
        "1",
        "--timeout-keep-alive",
        "65",
        "--timeout-graceful-shutdown",
        "30",
        "--h11-max-incomplete-event-size",
        "16777216",
      ]
    environment:
      PYTHONUNBUFFERED: 1
      FORCE_COLOR: 0
      WORKER_TYPE: main_app
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONPATH: /app/apps/api
      PYTHONIOENCODING: utf-8
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
    env_file:
      - ../../apps/api/.env
    ports:
      - "8000:80"
    restart: on-failure
    tty: true
    stdin_open: true
    depends_on:
      chromadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gaia_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G

  # ChromaDB Service
  chromadb:
    image: chromadb/chroma:1.5.1
    container_name: chromadb
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - PERSIST_DIRECTORY=/chroma/chroma
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
    ports:
      - "8080:8000"
    restart: on-failure
    healthcheck:
      test:
        ["CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  # Postgres Service
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres # pragma: allowlist secret
      POSTGRES_DB: langgraph
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: on-failure
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  # Redis Service
  redis:
    image: redis:8-alpine
    container_name: redis
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  # RabbitMQ Service
  rabbitmq:
    image: rabbitmq:4.1.8-management
    container_name: rabbitmq
    ports:
      - "5672:5672" # AMQP protocol
      - "15672:15672" # Management UI
      - "15692:15692" # Prometheus metrics
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./observability/rabbitmq-enabled-plugins:/etc/rabbitmq/enabled_plugins:ro
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  # Arq Worker
  arq_worker:
    container_name: arq_worker
    image: ghcr.io/theexperiencecompany/gaia:latest
    working_dir: /app/apps/api
    env_file:
      - ../../apps/api/.env
    environment:
      - WORKER_TYPE=arq_worker
      - PYTHONPATH=/app/apps/api
      - LOG_FORMAT=json
      - LOG_COLORIZE=false
      - ARQ_METRICS_PORT=9100
    command: ["python", "-m", "arq", "app.worker.WorkerSettings"]
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gaia_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; socket.create_connection(('redis', 6379), timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  # Discord Bot (optional - enable with --profile bots)
  discord-bot:
    container_name: discord-bot
    profiles: ["bots"]
    image: ghcr.io/theexperiencecompany/gaia-bot-discord:latest
    env_file:
      - ../../apps/bots/.env
    environment:
      - BOT_SERVER_PORT=3200
      - LOG_FORMAT=json
      - LOG_COLORIZE=false
    ports:
      - "127.0.0.1:${DISCORD_BOT_PORT:-3200}:3200"
    restart: always
    depends_on:
      gaia-backend:
        condition: service_healthy
    networks:
      - gaia_network

  # Slack Bot (optional - enable with --profile bots)
  slack-bot:
    container_name: slack-bot
    profiles: ["bots"]
    image: ghcr.io/theexperiencecompany/gaia-bot-slack:latest
    env_file:
      - ../../apps/bots/.env
    environment:
      - BOT_SERVER_PORT=3201
      - LOG_FORMAT=json
      - LOG_COLORIZE=false
    ports:
      - "127.0.0.1:${SLACK_BOT_PORT:-3201}:3201"
    restart: always
    depends_on:
      gaia-backend:
        condition: service_healthy
    networks:
      - gaia_network

  # Telegram Bot (optional - enable with --profile bots)
  telegram-bot:
    container_name: telegram-bot
    profiles: ["bots"]
    image: ghcr.io/theexperiencecompany/gaia-bot-telegram:latest
    env_file:
      - ../../apps/bots/.env
    environment:
      - BOT_SERVER_PORT=3202
      - LOG_FORMAT=json
      - LOG_COLORIZE=false
    ports:
      - "127.0.0.1:${TELEGRAM_BOT_PORT:-3202}:3202"
    restart: always
    depends_on:
      gaia-backend:
        condition: service_healthy
    networks:
      - gaia_network

  # WhatsApp Bot (optional - enable with --profile bots)
  # Serves both /health and /webhook (Kapso) on the same port.
  whatsapp-bot:
    container_name: whatsapp-bot
    profiles: ["bots"]
    image: ghcr.io/theexperiencecompany/gaia-bot-whatsapp:latest
    env_file:
      - ../../apps/bots/.env
    environment:
      - BOT_SERVER_PORT=3203
      - LOG_FORMAT=json
      - LOG_COLORIZE=false
    ports:
      - "127.0.0.1:${WHATSAPP_BOT_PORT:-3203}:3203"
    restart: always
    depends_on:
      gaia-backend:
        condition: service_healthy
    networks:
      - gaia_network

  # Voice Agent Worker (optional - enable with --profile voice-agent)
  voice-agent-worker:
    container_name: voice-agent-worker
    image: ghcr.io/theexperiencecompany/gaia-voice-agent:latest
    profiles: ["voice-agent"]
    working_dir: /app/apps/voice-agent
    environment:
      PYTHONUNBUFFERED: 1
      FORCE_COLOR: 1
      WORKER_TYPE: voice_agent_worker
      PYTHONDONTWRITEBYTECODE: 1
      HF_HUB_OFFLINE: "1"
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      HF_HUB_DISABLE_SYMLINKS_WARNING: "1"
    env_file:
      - ../../apps/api/.env
    volumes:
      - voice_agent_models:/home/appuser/.cache/huggingface
    restart: always
    depends_on:
      gaia-backend:
        condition: service_healthy
    networks:
      - gaia_network

  # ---------------------------------------------------------------------------
  # Metrics exporters
  # ---------------------------------------------------------------------------

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.0
    container_name: postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/langgraph?sslmode=disable" # pragma: allowlist secret
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gaia_network

  redis_exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: redis_exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gaia_network

  # Container metrics (CPU, memory, network, disk I/O per container)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.54.1
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - "--docker_only=true"
      - "--housekeeping_interval=30s"
    restart: unless-stopped
    networks:
      - gaia_network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  # Host machine metrics (CPU, memory, disk, network)
  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node_exporter
    pid: host
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped
    networks:
      - gaia_network

  # HTTP probe for services without native Prometheus metrics (e.g. ChromaDB)
  blackbox_exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox_exporter
    volumes:
      - ./observability/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    restart: unless-stopped
    networks:
      - gaia_network

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observability/metrics_token:/etc/prometheus/metrics_token:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    networks:
      - gaia_network
    mem_limit: 512m
    cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Observability stack — Loki (log store) + Promtail (shipper) + Grafana (UI)
  # Access Grafana at http://<server-ip>:3000  (admin / see GRAFANA_ADMIN_PASSWORD)
  # ---------------------------------------------------------------------------

  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:${LOKI_HOST_PORT:-3100}:3100"
    restart: unless-stopped
    networks:
      - gaia_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: "0.5"

  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    # Run as root so Promtail can read the Docker socket (owned by root:docker).
    # Promtail 3.x defaults to uid 10001 which lacks socket access.
    user: root
    # Disable Docker logging for Promtail itself — it collects other containers'
    # logs via the Docker socket, so its own stdout should never be captured.
    # Without this, a JSON parse error → debug log → Docker capture feedback
    # loop can fill the disk (35 GB in one incident).
    logging:
      driver: "none"
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      - promtail_positions:/tmp
    command: -config.file=/etc/promtail/config.yaml -config.expand-env=true
    environment:
      LOKI_PUSH_URL: ${LOKI_PUSH_URL:-http://loki:3100/loki/api/v1/push}
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - gaia_network
    mem_limit: 128m
    cpus: "0.25"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "${GRAFANA_HOST_PORT:-4000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    environment:
      # IMPORTANT: Set GRAFANA_ADMIN_PASSWORD in your .env file before deploying.
      # The default "changeme" is intentionally obvious — change it for production.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      # Set GRAFANA_ROOT_URL if Grafana is behind a reverse proxy (e.g. https://grafana.example.com)
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:4000}
      # Slack webhook for alert notifications (leave empty to disable)
      SLACK_ALERT_WEBHOOK_URL: ${SLACK_ALERT_WEBHOOK_URL:-}
      SLACK_ALERT_CHANNEL: ${SLACK_ALERT_CHANNEL:-#alerts}
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - gaia_network
    mem_limit: 256m
    cpus: "0.5"

volumes:
  chroma_data:
  pgdata:
  redis_data:
  rabbitmq_data:
  voice_agent_models:
  loki_data:
  grafana_data:
  prometheus_data:
  promtail_positions:

networks:
  gaia_network:
    driver: bridge
