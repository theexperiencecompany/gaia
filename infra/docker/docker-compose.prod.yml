# Production stack — deployed via `docker stack deploy`.
# Secrets are mounted as files under /run/secrets/*; scripts/docker-entrypoint.sh
# (baked into each image) reads them and exports env vars before exec.
# This file can also be used with `docker compose` for local rehearsal — see
# scripts/swarm/lab-rehearsal.sh.

secrets:
  gaia_infisical_token:
    external: true
  gaia_infisical_machine_identity_client_id:
    external: true
  gaia_infisical_machine_identity_client_secret:
    external: true
  gaia_infisical_project_id:
    external: true
  gaia_metrics_token:
    external: true
  gaia_grafana_admin_password:
    external: true
  gaia_postgres_password:
    external: true
    name: gaia_postgres_password_v2
  gaia_rabbitmq_default_pass:
    external: true
    name: gaia_rabbitmq_default_pass_v2

services:
  # ---------------------------------------------------------------------------
  # API
  # ---------------------------------------------------------------------------

  gaia-backend:
    image: ghcr.io/theexperiencecompany/gaia:latest
    working_dir: /app/apps/api
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 80 --no-access-log --workers 1 --timeout-keep-alive 65 --timeout-graceful-shutdown 30 --h11-max-incomplete-event-size 16777216
    environment:
      PYTHONUNBUFFERED: "1"
      FORCE_COLOR: "0"
      WORKER_TYPE: main_app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPATH: /app/apps/api
      PYTHONIOENCODING: utf-8
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
      ENV: production
      INFISICAL_ENV: prod
    secrets:
      - gaia_infisical_token
      - gaia_infisical_machine_identity_client_id
      - gaia_infisical_machine_identity_client_secret
      - gaia_infisical_project_id
      - gaia_metrics_token
    ports:
      # mode: host bypasses Swarm ingress so host_ip is actually enforced.
      # Nginx on the host proxies public traffic here.
      - target: 80
        published: 8000
        host_ip: "127.0.0.1"
        protocol: tcp
        mode: host
    networks:
      gaia-prod-shared:
        aliases:
          - gaia-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
        monitor: 45s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 4G

  # ---------------------------------------------------------------------------
  # ARQ Worker
  # ---------------------------------------------------------------------------

  arq_worker:
    image: ghcr.io/theexperiencecompany/gaia:latest
    working_dir: /app/apps/api
    command: python -m arq app.worker.WorkerSettings
    environment:
      WORKER_TYPE: arq_worker
      PYTHONPATH: /app/apps/api
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
      ARQ_METRICS_PORT: "9100"
      ENV: production
      INFISICAL_ENV: prod
    secrets:
      - gaia_infisical_token
      - gaia_infisical_machine_identity_client_id
      - gaia_infisical_machine_identity_client_secret
      - gaia_infisical_project_id
      - gaia_metrics_token
    networks:
      gaia-prod-shared:
        aliases:
          - arq_worker
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('redis', 6379), timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
        monitor: 45s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 2G

  # ---------------------------------------------------------------------------
  # Bots
  # ---------------------------------------------------------------------------

  discord-bot:
    image: ghcr.io/theexperiencecompany/gaia-bot-discord:latest
    environment:
      BOT_SERVER_PORT: "3200"
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
      ENV: production
      INFISICAL_ENV: prod
    secrets:
      - gaia_infisical_token
      - gaia_infisical_machine_identity_client_id
      - gaia_infisical_machine_identity_client_secret
      - gaia_infisical_project_id
    ports:
      # mode: host bypasses Swarm ingress so host_ip is actually enforced.
      # Nginx proxies /bots/discord/* from the public internet.
      - target: 3200
        published: 3200
        host_ip: "127.0.0.1"
        protocol: tcp
        mode: host
    networks:
      gaia-prod-shared:
        aliases:
          - discord-bot
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3200/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s

  slack-bot:
    image: ghcr.io/theexperiencecompany/gaia-bot-slack:latest
    environment:
      BOT_SERVER_PORT: "3201"
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
      ENV: production
      INFISICAL_ENV: prod
    secrets:
      - gaia_infisical_token
      - gaia_infisical_machine_identity_client_id
      - gaia_infisical_machine_identity_client_secret
      - gaia_infisical_project_id
    ports:
      # mode: host bypasses Swarm ingress so host_ip is actually enforced.
      # Nginx proxies /bots/slack/* from the public internet.
      - target: 3201
        published: 3201
        host_ip: "127.0.0.1"
        protocol: tcp
        mode: host
    networks:
      gaia-prod-shared:
        aliases:
          - slack-bot
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3201/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s

  telegram-bot:
    image: ghcr.io/theexperiencecompany/gaia-bot-telegram:latest
    environment:
      BOT_SERVER_PORT: "3202"
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
      ENV: production
      INFISICAL_ENV: prod
    secrets:
      - gaia_infisical_token
      - gaia_infisical_machine_identity_client_id
      - gaia_infisical_machine_identity_client_secret
      - gaia_infisical_project_id
    ports:
      # mode: host bypasses Swarm ingress so host_ip is actually enforced.
      # Nginx proxies /bots/telegram/* from the public internet.
      - target: 3202
        published: 3202
        host_ip: "127.0.0.1"
        protocol: tcp
        mode: host
    networks:
      gaia-prod-shared:
        aliases:
          - telegram-bot
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3202/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s

  whatsapp-bot:
    image: ghcr.io/theexperiencecompany/gaia-bot-whatsapp:latest
    environment:
      BOT_SERVER_PORT: "3203"
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
      ENV: production
      INFISICAL_ENV: prod
    secrets:
      - gaia_infisical_token
      - gaia_infisical_machine_identity_client_id
      - gaia_infisical_machine_identity_client_secret
      - gaia_infisical_project_id
    ports:
      # mode: host bypasses Swarm ingress so host_ip is actually enforced.
      # Nginx proxies /api/v1/webhook/whatsapp + /bots/whatsapp/*.
      - target: 3203
        published: 3203
        host_ip: "127.0.0.1"
        protocol: tcp
        mode: host
    networks:
      gaia-prod-shared:
        aliases:
          - whatsapp-bot
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3203/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  chromadb:
    image: chromadb/chroma:1.5.1
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      PERSIST_DIRECTORY: /chroma/chroma
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_PORT: "8000"
    ports:
      # mode: host bypasses Swarm ingress so host_ip is actually enforced.
      # Only reached by the backend via the overlay network — ChromaDB has no auth.
      - target: 8000
        published: 8080
        host_ip: "127.0.0.1"
        protocol: tcp
        mode: host
    networks:
      gaia-prod-shared:
        aliases:
          - chromadb
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.labels.type == storage

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      # Password is read from the Swarm secret file at /run/secrets/gaia_postgres_password.
      # The official postgres image supports *_FILE variants for secrets-on-disk.
      POSTGRES_PASSWORD_FILE: /run/secrets/gaia_postgres_password
      POSTGRES_DB: langgraph
    secrets:
      - gaia_postgres_password
    ports:
      # mode: host bypasses Swarm ingress so host_ip is actually enforced.
      # Only reached by the backend via the overlay network — never expose 5432 publicly.
      - target: 5432
        published: 5432
        host_ip: "127.0.0.1"
        protocol: tcp
        mode: host
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      gaia-prod-shared:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.labels.type == storage

  redis:
    image: redis:8-alpine
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      gaia-prod-shared:
        aliases:
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.labels.type == storage

  rabbitmq:
    image: rabbitmq:4.1.8-management
    # RabbitMQ 4.x deprecated RABBITMQ_DEFAULT_USER/PASS env vars. Users are
    # managed via `rabbitmqctl` against the running broker and persist in the
    # data volume. The Swarm secret `gaia_rabbitmq_default_pass` exists for
    # disaster recovery / fresh volume bootstrapping — see docs/deployment/secrets.mdx.
    ports:
      # mode: host bypasses Swarm ingress so host_ip is actually enforced.
      # Credentials still apply, but don't expose these publicly.
      - target: 5672
        published: 5672
        host_ip: "127.0.0.1"
        protocol: tcp
        mode: host
      - target: 15672
        published: 15672
        host_ip: "127.0.0.1"
        protocol: tcp
        mode: host
      - target: 15692
        published: 15692
        host_ip: "127.0.0.1"
        protocol: tcp
        mode: host
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./observability/rabbitmq-enabled-plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      gaia-prod-shared:
        aliases:
          - rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.labels.type == storage

  # ---------------------------------------------------------------------------
  # Metrics exporters
  # ---------------------------------------------------------------------------

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.0
    # The exporter composes DATA_SOURCE_NAME from URI + USER + PASS. Only the
    # password is secret — user and host are safe to commit. PASS_FILE reads
    # the secret contents as the password.
    environment:
      DATA_SOURCE_URI: "postgres:5432/langgraph?sslmode=disable"
      DATA_SOURCE_USER: "postgres"
      DATA_SOURCE_PASS_FILE: /run/secrets/gaia_postgres_password
    secrets:
      - gaia_postgres_password
    networks:
      - gaia-prod-shared
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  redis_exporter:
    image: oliver006/redis_exporter:v1.66.0
    environment:
      REDIS_ADDR: "redis://redis:6379"
    networks:
      - gaia-prod-shared
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.54.1
    # mode: global — one instance per swarm node.
    # Port 8081 is bound in host mode so Prometheus can scrape each node
    # individually at <node-ip>:8081 rather than through the ingress mesh.
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - "--docker_only=true"
      - "--housekeeping_interval=30s"
    # Port 8081 is bound in host mode so Prometheus can scrape each Swarm node
    # individually at <node-ip>:8081 rather than through the ingress mesh.
    # Binding to 0.0.0.0 is intentional for cross-node scraping; restrict access via firewall.
    ports:
      - target: 8080
        published: 8081
        protocol: tcp
        mode: host
    networks:
      - gaia-prod-shared
    deploy:
      mode: global
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  node_exporter:
    image: prom/node-exporter:v1.8.2
    # mode: global — one instance per swarm node.
    # Port 9100 is bound in host mode so Prometheus can scrape each node
    # individually at <node-ip>:9100 rather than through the ingress mesh.
    pid: host
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    ports:
      - target: 9100
        published: 9100
        protocol: tcp
        mode: host
    networks:
      - gaia-prod-shared
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9100/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      mode: global
      restart_policy:
        condition: any
        delay: 5s

  blackbox_exporter:
    image: prom/blackbox-exporter:v0.25.0
    volumes:
      - ./observability/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - gaia-prod-shared
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

  prometheus:
    image: prom/prometheus:v3.1.0
    user: root  # needed to read /var/run/docker.sock for Swarm SD
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    secrets:
      - gaia_metrics_token
    networks:
      - gaia-prod-shared
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------------------------------------
  # Observability — Loki + Promtail + Grafana
  # ---------------------------------------------------------------------------

  loki:
    image: grafana/loki:3.3.2
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - target: 3100
        published: "${LOKI_HOST_PORT:-3100}"
        host_ip: "127.0.0.1"
        protocol: tcp
        mode: host
    networks:
      gaia-prod-shared:
        aliases:
          - loki
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
      placement:
        constraints:
          - node.role == manager

  promtail:
    image: grafana/promtail:3.3.2
    # mode: global — runs one instance per swarm node to collect all container logs
    user: root
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      - promtail_positions:/tmp
    command: -config.file=/etc/promtail/config.yaml -config.expand-env=true
    environment:
      LOKI_PUSH_URL: ${LOKI_PUSH_URL:-http://loki:3100/loki/api/v1/push}
    networks:
      - gaia-prod-shared
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9080/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      mode: global
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      # Loopback only — Nginx on the host proxies logs.heygaia.io to this.
      - target: 3000
        published: "${GRAFANA_HOST_PORT:-4000}"
        host_ip: "127.0.0.1"
        protocol: tcp
        mode: host
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/gaia_grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:4000}
      SLACK_ALERT_WEBHOOK_URL: ${SLACK_ALERT_WEBHOOK_URL}
      SLACK_ALERT_CHANNEL: ${SLACK_ALERT_CHANNEL:-#alerts}
    secrets:
      - gaia_grafana_admin_password
    networks:
      - gaia-prod-shared
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
      placement:
        constraints:
          - node.role == manager

  # ---------------------------------------------------------------------------
  # Voice agent (deploy manually or via separate workflow — not part of hot path)
  # ---------------------------------------------------------------------------

  voice-agent-worker:
    image: ghcr.io/theexperiencecompany/gaia-voice-agent:latest
    working_dir: /app/apps/voice-agent
    environment:
      PYTHONUNBUFFERED: "1"
      FORCE_COLOR: "1"
      WORKER_TYPE: voice_agent_worker
      PYTHONDONTWRITEBYTECODE: "1"
      HF_HUB_OFFLINE: "1"
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      HF_HUB_DISABLE_SYMLINKS_WARNING: "1"
    volumes:
      - voice_agent_models:/home/appuser/.cache/huggingface
    networks:
      - gaia-prod-shared
    deploy:
      # replicas: 0 — not started by default; scale up manually when needed:
      #   docker --context gaia-prod service scale gaia-prod_voice-agent-worker=1
      replicas: 0
      restart_policy:
        condition: any
        delay: 5s
      placement:
        constraints:
          - node.role == manager

volumes:
  chroma_data:
  pgdata:
  redis_data:
  rabbitmq_data:
  voice_agent_models:
  loki_data:
  grafana_data:
  prometheus_data:
  promtail_positions:

networks:
  gaia-prod-shared:
    external: true
    name: gaia-prod-shared
