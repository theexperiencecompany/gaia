name: gaia-dev

services:
  # FastAPI Application — profile-gated so `mise dev` runs the API natively on
  # the host (hot reload, fast iteration on macOS). Opt into the dockered API
  # with `docker compose --profile backend up -d` when you need the juicefs CLI
  # + /mnt/jfs FUSE mount that a native `nx dev api` on macOS cannot provide.
  gaia-backend:
    container_name: gaia-backend
    profiles: ["backend", "all"]
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: gaia
    working_dir: /app/apps/api
    # Packages are already installed system-wide by the Dockerfile via
    # `uv sync --frozen` against UV_PROJECT_ENVIRONMENT=/usr/local. Call python
    # directly so we don't trigger uv's runtime sync (which would try to mutate
    # root-owned files in /usr/local/lib as appuser).
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "80",
        "--reload",
        "--no-access-log",
      ]
    environment:
      DEBUG: 1
      PYTHONUNBUFFERED: 1
      WATCHFILES_FORCE_POLLING: 1
      # PYTHONPROFILEIMPORTTIME: 1
      FORCE_COLOR: 0
      WORKER_TYPE: main_app
      PYTHONPATH: /app/apps/api
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
      # Persistent workspace storage (JuiceFS on Cloudflare R2). Sidecar mount
      # at /mnt/jfs is created on the host (or as a tmpfs in dev when R2 is
      # unset — the storage helper short-circuits gracefully in that case).
      JUICEFS_HOST_MOUNT_PATH: /mnt/jfs
      # Skip uv's env sync at runtime; the Dockerfile already installed every
      # package system-wide via `uv sync --frozen` at build time. Without this,
      # `uv run` tries to mutate root-owned files in /usr/local/lib as appuser.
      UV_NO_SYNC: "1"
      # Override Infisical's localhost URLs with the docker-compose service
      # hostnames. Infisical respects pre-set env vars, so these take precedence.
      # (The "localhost" URLs in Infisical are for `nx dev api` where Python
      # runs on the host and connects to dockered infra at host-mapped ports.)
      # libpq form (not postgresql+asyncpg://): the langgraph checkpointer
      # feeds POSTGRES_URL straight to psycopg, and db/postgresql.py adapts
      # this same URL for the asyncpg SQLAlchemy engine. The +asyncpg dialect
      # form makes psycopg fail with: missing "=" after "postgresql+asyncpg://".
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/langgraph
      REDIS_URL: redis://redis:6379/0
      MONGO_DB: mongodb://mongo:27017/
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: "8000"
      # E2B's watch_dir (inotify) cannot watch the FUSE-mounted JuiceFS
      # ("cannot watch path on network filesystem"). Use the JuiceFS-native
      # .accesslog tail instead — the Phase 0 verdict for this stack.
      ARTIFACT_DETECTION_MODE: accesslog
      # JUICEFS_META_URL_TEMPLATE is intentionally NOT overridden: the API host
      # and the E2B sandboxes must share one JuiceFS namespace (the artifact
      # watcher reads host-side what the sandbox wrote). Let Infisical supply
      # the same cloud meta the sandboxes use. A local postgres meta would be a
      # separate namespace over the same R2 volume — JuiceFS refuses to
      # double-format it ("Storage ... is not empty; pick another volume name").
    env_file:
      - ../../apps/api/.env
    volumes:
      - ../../apps/api/app:/app/apps/api/app
      - juicefs_cache:/var/cache/juicefs
    # Harden the resolver: Docker's embedded DNS (127.0.0.11) intermittently
    # drops rapid back-to-back external lookups, so juicefs sees a spurious
    # "no such host" for the managed-Postgres meta. Retry/extend timeouts
    # WITHOUT overriding `dns:` (that would break compose service discovery
    # for postgres/redis/etc.). Single-request avoids the parallel A/AAAA
    # race that surfaced "network is unreachable" on IPv6-less networks.
    dns_opt:
      - attempts:5
      - timeout:3
      - single-request
    # FUSE mount inside container requires SYS_ADMIN + /dev/fuse + an
    # unconfined apparmor profile on Ubuntu/Debian hosts. Without these,
    # `juicefs mount` fails with "fusermount3: cannot open /dev/fuse".
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    security_opt:
      - apparmor:unconfined
    ports:
      - "${API_HOST_PORT:-8000}:80"
    restart: on-failure
    tty: true
    stdin_open: true
    depends_on:
      chromadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - gaia_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ChromaDB Service
  chromadb:
    image: chromadb/chroma:1.5.1
    container_name: chromadb
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - PERSIST_DIRECTORY=/chroma/chroma
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
    ports:
      - "${CHROMADB_HOST_PORT:-8080}:8000"
    restart: on-failure
    healthcheck:
      test:
        ["CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  # Postgres Service
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres # pragma: allowlist secret
      POSTGRES_DB: langgraph
    volumes:
      - pgdata:/var/lib/postgresql
      # postgres-init/*.sql runs once on first init — creates gaia_juicefs_0
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    restart: on-failure
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  # Redis Service
  redis:
    image: redis:8-alpine
    container_name: redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  # MongoDB Service
  mongo:
    image: mongo:8
    container_name: mongo
    volumes:
      - mongo_data:/data/db
    restart: on-failure
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  # RabbitMQ Service
  rabbitmq:
    image: rabbitmq:4.1.8-management
    container_name: rabbitmq
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672" # AMQP protocol
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
      - "${RABBITMQ_PROM_PORT:-15692}:15692" # Prometheus metrics
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./observability/rabbitmq-enabled-plugins:/etc/rabbitmq/enabled_plugins:ro
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  # Arq Worker (use profile to run in docker, otherwise run locally with mise)
  arq_worker:
    container_name: arq_worker
    image: gaia
    profiles: ["worker", "all"]
    working_dir: /app/apps/api
    env_file:
      - ../../apps/api/.env
    environment:
      - WORKER_TYPE=arq_worker
      - PYTHONPATH=/app/apps/api
      - LOG_FORMAT=json
      - LOG_COLORIZE=false
      - ARQ_METRICS_PORT=9100
      - JUICEFS_HOST_MOUNT_PATH=/mnt/jfs
      - UV_NO_SYNC=1
      # Same Infisical-overrides as gaia-backend (container hostnames)
      - POSTGRES_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/langgraph
      - REDIS_URL=redis://redis:6379/0
      - MONGO_DB=mongodb://mongo:27017/
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - JUICEFS_META_URL_TEMPLATE=postgres://postgres:postgres@postgres:5432/gaia_juicefs_{shard}?sslmode=disable
    expose:
      - "9100"
    command: ["python", "-m", "arq", "app.worker.WorkerSettings"]
    restart: always
    volumes:
      - ../../apps/api/app:/app/apps/api/app
      - juicefs_cache:/var/cache/juicefs
    # JuiceFS mount needs FUSE; same caps/devices as gaia-backend
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    security_opt:
      - apparmor:unconfined
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - gaia_network

  # Mongo Express Service
  mongo_express:
    image: mongo-express:latest
    container_name: mongo_express
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password # pragma: allowlist secret
    ports:
      - "${MONGO_EXPRESS_HOST_PORT:-8083}:8081"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - gaia_network

  # Discord Bot
  discord-bot:
    container_name: discord-bot
    profiles: ["bots", "all"]
    build:
      context: ../..
      dockerfile: apps/bots/Dockerfile
      args:
        BOT_NAME: discord
    env_file:
      - ../../apps/bots/.env
    environment:
      - BOT_SERVER_PORT=3200
      - LOG_FORMAT=json
      - LOG_COLORIZE=false
      # In-container the broker is reached via its network alias, overriding
      # any host-oriented RABBITMQ_URL from apps/bots/.env.
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "${DISCORD_BOT_PORT:-3200}:3200"
    restart: on-failure
    depends_on:
      gaia-backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gaia_network

  # Slack Bot
  slack-bot:
    container_name: slack-bot
    profiles: ["bots", "all"]
    build:
      context: ../..
      dockerfile: apps/bots/Dockerfile
      args:
        BOT_NAME: slack
    env_file:
      - ../../apps/bots/.env
    environment:
      - BOT_SERVER_PORT=3201
      - LOG_FORMAT=json
      - LOG_COLORIZE=false
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "${SLACK_BOT_PORT:-3201}:3201"
    restart: on-failure
    depends_on:
      gaia-backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gaia_network

  # Telegram Bot
  telegram-bot:
    container_name: telegram-bot
    profiles: ["bots", "all"]
    build:
      context: ../..
      dockerfile: apps/bots/Dockerfile
      args:
        BOT_NAME: telegram
    # Generate ../../apps/bots/.env from apps/bots/.env.example before enabling bots.
    env_file:
      - ../../apps/bots/.env
    environment:
      - BOT_SERVER_PORT=3202
      - LOG_FORMAT=json
      - LOG_COLORIZE=false
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "${TELEGRAM_BOT_PORT:-3202}:3202"
    restart: on-failure
    depends_on:
      gaia-backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gaia_network

  # WhatsApp Bot — serves both /health and /webhook on the same port
  whatsapp-bot:
    container_name: whatsapp-bot
    profiles: ["bots", "all"]
    build:
      context: ../..
      dockerfile: apps/bots/Dockerfile
      args:
        BOT_NAME: whatsapp
    env_file:
      - ../../apps/bots/.env
    environment:
      - BOT_SERVER_PORT=3203
      - LOG_FORMAT=json
      - LOG_COLORIZE=false
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "${WHATSAPP_BOT_PORT:-3203}:3203"
    restart: on-failure
    depends_on:
      gaia-backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gaia_network

  # Voice Agent Worker
  voice-agent-worker:
    container_name: voice-agent-worker
    profiles: ["backend", "voice"]
    build:
      context: ../..
      dockerfile: apps/voice-agent/Dockerfile
    image: gaia-voice-agent
    working_dir: /app/apps/voice-agent
    environment:
      PYTHONUNBUFFERED: 1
      FORCE_COLOR: 0
      WORKER_TYPE: voice_agent_worker
      DEBUG: 1
      WATCHFILES_FORCE_POLLING: 1
      HF_HUB_OFFLINE: "0"
      LOCAL_FILES_ONLY: "0"
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
    env_file:
      - ../../apps/api/.env
    volumes:
      - voice_agent_models:/home/appuser/.cache/huggingface
    restart: on-failure
    networks:
      - gaia_network

  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    profiles: ["observability", "all"]
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - gaia_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: "0.5"

  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    profiles: ["observability", "all"]
    user: root
    # Prevent log feedback loop — Promtail's own stdout must not be captured by
    # Docker, or JSON parse errors spiral into tens of GB of disk usage.
    logging:
      driver: "none"
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount local log files so promtail can ship them even when services
      # run outside Docker (nx dev api, nx worker api, nx dev voice-agent).
      - ../../apps/api/logs:/var/log/gaia-api:ro
      - ../../apps/api/logs/worker:/var/log/gaia-worker:ro
      - ../../apps/voice-agent/logs:/var/log/gaia-voice-agent:ro
    command: -config.file=/etc/promtail/config.yaml
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - gaia_network
    mem_limit: 128m
    cpus: "0.25"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    profiles: ["observability", "all"]
    ports:
      - "${GRAFANA_HOST_PORT:-4000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    environment:
      # IMPORTANT: Set GRAFANA_ADMIN_PASSWORD in your .env file before deploying.
      # The default "changeme" is intentionally obvious — change it for production.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:4000}
      # Use the provisioned GAIA Overview dashboard as the home page
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/overview.json
      # Slack webhook consumed by contact-points.yaml (leave empty to disable alerts)
      SLACK_ALERT_WEBHOOK_URL: ${SLACK_ALERT_WEBHOOK_URL:-}
      SLACK_ALERT_CHANNEL: ${SLACK_ALERT_CHANNEL:-#alerts}
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - gaia_network
    mem_limit: 256m
    cpus: "0.5"

volumes:
  chroma_data:
  pgdata:
  redis_data:
  mongo_data:
  rabbitmq_data:
  voice_agent_models:
  loki_data:
  grafana_data:
  prometheus_data:
  juicefs_cache:

networks:
  gaia_network:
    driver: bridge
