name: gaia-dev

services:
  # FastAPI Application (use profile to run in docker, otherwise run locally with mise)
  gaia-backend:
    container_name: gaia-backend
    profiles: ["backend", "all"]
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: gaia
    working_dir: /app/apps/api
    command:
      [
        "uv",
        "run",
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "80",
        "--reload",
        "--no-access-log",
      ]
    environment:
      DEBUG: 1
      PYTHONUNBUFFERED: 1
      WATCHFILES_FORCE_POLLING: 1
      # PYTHONPROFILEIMPORTTIME: 1
      FORCE_COLOR: 0
      WORKER_TYPE: main_app
      PYTHONPATH: /app/apps/api
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
    env_file:
      - ../../apps/api/.env
    volumes:
      - ../../apps/api/app:/app/apps/api/app
    ports:
      - "${API_HOST_PORT:-8000}:80"
    restart: on-failure
    tty: true
    stdin_open: true
    depends_on:
      chromadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - gaia_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ChromaDB Service
  chromadb:
    image: chromadb/chroma:1.5.1
    container_name: chromadb
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - PERSIST_DIRECTORY=/chroma/chroma
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
    ports:
      - "${CHROMADB_HOST_PORT:-8080}:8000"
    restart: on-failure
    healthcheck:
      test:
        ["CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  # Postgres Service
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres # pragma: allowlist secret
      POSTGRES_DB: langgraph
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    restart: on-failure
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  # Redis Service
  redis:
    image: redis:8-alpine
    container_name: redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  # MongoDB Service
  mongo:
    image: mongo:8
    container_name: mongo
    volumes:
      - mongo_data:/data/db
    restart: on-failure
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  # RabbitMQ Service
  rabbitmq:
    image: rabbitmq:4.1.8-management
    container_name: rabbitmq
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672" # AMQP protocol
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
      - "${RABBITMQ_PROM_PORT:-15692}:15692" # Prometheus metrics
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./observability/rabbitmq-enabled-plugins:/etc/rabbitmq/enabled_plugins:ro
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - gaia_network

  # Arq Worker (use profile to run in docker, otherwise run locally with mise)
  arq_worker:
    container_name: arq_worker
    image: gaia
    profiles: ["worker", "all"]
    working_dir: /app/apps/api
    env_file:
      - ../../apps/api/.env
    environment:
      - WORKER_TYPE=arq_worker
      - PYTHONPATH=/app/apps/api
      - LOG_FORMAT=json
      - LOG_COLORIZE=false
    command: ["uv", "run", "python", "-m", "arq", "app.worker.WorkerSettings"]
    restart: always
    volumes:
      - ../../apps/api/app:/app/apps/api/app
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - gaia_network

  # Mongo Express Service
  mongo_express:
    image: mongo-express:latest
    container_name: mongo_express
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password # pragma: allowlist secret
    ports:
      - "${MONGO_EXPRESS_HOST_PORT:-8083}:8081"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - gaia_network

  # Discord Bot
  discord-bot:
    container_name: discord-bot
    profiles: ["bots", "all"]
    build:
      context: ../..
      dockerfile: apps/bots/Dockerfile
      args:
        BOT_NAME: discord
    env_file:
      - ../../apps/bots/.env
    restart: on-failure
    depends_on:
      gaia-backend:
        condition: service_healthy
    networks:
      - gaia_network

  # Slack Bot
  slack-bot:
    container_name: slack-bot
    profiles: ["bots", "all"]
    build:
      context: ../..
      dockerfile: apps/bots/Dockerfile
      args:
        BOT_NAME: slack
    env_file:
      - ../../apps/bots/.env
    restart: on-failure
    depends_on:
      gaia-backend:
        condition: service_healthy
    networks:
      - gaia_network

  # Telegram Bot
  telegram-bot:
    container_name: telegram-bot
    profiles: ["bots", "all"]
    build:
      context: ../..
      dockerfile: apps/bots/Dockerfile
      args:
        BOT_NAME: telegram
    # Generate ../../apps/bots/.env from apps/bots/.env.example before enabling bots.
    env_file:
      - ../../apps/bots/.env
    restart: on-failure
    depends_on:
      gaia-backend:
        condition: service_healthy
    networks:
      - gaia_network

  # Voice Agent Worker
  voice-agent-worker:
    container_name: voice-agent-worker
    profiles: ["backend", "voice"]
    build:
      context: ../..
      dockerfile: apps/voice-agent/Dockerfile
    image: gaia-voice-agent
    working_dir: /app/apps/voice-agent
    environment:
      PYTHONUNBUFFERED: 1
      FORCE_COLOR: 0
      WORKER_TYPE: voice_agent_worker
      DEBUG: 1
      WATCHFILES_FORCE_POLLING: 1
      HF_HUB_OFFLINE: "0"
      LOCAL_FILES_ONLY: "0"
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      LOG_FORMAT: json
      LOG_COLORIZE: "false"
    env_file:
      - ../../apps/api/.env
    volumes:
      - voice_agent_models:/home/appuser/.cache/huggingface
    restart: on-failure
    networks:
      - gaia_network

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observability/metrics_token:/etc/prometheus/metrics_token:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    networks:
      - gaia_network
    mem_limit: 512m
    cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Observability stack — Loki + Promtail + Grafana
  # Always started with docker compose up (no profile needed).
  # Access Grafana at http://localhost:4000  (admin / admin)
  # ---------------------------------------------------------------------------

  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - gaia_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: "0.5"

  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    user: root
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount local log files so promtail can ship them even when services
      # run outside Docker (nx dev api, nx worker api, nx dev voice-agent).
      - ../../apps/api/logs:/var/log/gaia-api:ro
      - ../../apps/api/logs/worker:/var/log/gaia-worker:ro
      - ../../apps/voice-agent/logs:/var/log/gaia-voice-agent:ro
    command: -config.file=/etc/promtail/config.yaml -config.expand-env=true
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - gaia_network
    mem_limit: 128m
    cpus: "0.25"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "${GRAFANA_HOST_PORT:-4000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    environment:
      # IMPORTANT: Set GRAFANA_ADMIN_PASSWORD in your .env file before deploying.
      # The default "changeme" is intentionally obvious — change it for production.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - gaia_network
    mem_limit: 256m
    cpus: "0.5"

volumes:
  chroma_data:
  pgdata:
  redis_data:
  mongo_data:
  rabbitmq_data:
  voice_agent_models:
  loki_data:
  grafana_data:
  prometheus_data:

networks:
  gaia_network:
    driver: bridge
