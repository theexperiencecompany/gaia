global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gaia-api
    # Bearer token must match METRICS_TOKEN in the API's environment.
    authorization:
      credentials_file: /run/secrets/gaia_metrics_token
    static_configs:
      - targets: ["gaia-backend:80"]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis_exporter:9121"]

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: arq_worker
    static_configs:
      - targets: ["arq_worker:9100"]

  # node_exporter — mode: global, one per swarm node, port 9100 bound in host
  # mode. Prometheus uses Swarm node discovery to find every node's host IP,
  # then scrapes <node-ip>:9100 directly — no ingress mesh, no load balancing.
  # Adding a new node automatically appears here within one scrape interval.
  - job_name: node
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: nodes
    relabel_configs:
      # Only scrape nodes that are active in the swarm
      - source_labels: [__meta_dockerswarm_node_status]
        regex: ready
        action: keep
      # node_exporter is bound to host port 9100 — use the node's host IP
      - source_labels: [__meta_dockerswarm_node_address]
        replacement: '$1:9100'
        target_label: __address__
      # Use the node hostname as the instance label for Grafana filtering
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: instance

  # cadvisor — mode: global, one per swarm node, port 8081 bound in host mode
  # (8080 is taken by chromadb). Same pattern as node_exporter above.
  - job_name: cadvisor
    scrape_interval: 15s
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: nodes
    relabel_configs:
      - source_labels: [__meta_dockerswarm_node_status]
        regex: ready
        action: keep
      # cadvisor is bound to host port 8081 — use the node's host IP
      - source_labels: [__meta_dockerswarm_node_address]
        replacement: '$1:8081'
        target_label: __address__
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: instance

  # Blackbox HTTP probes for services without native Prometheus metrics
  - job_name: chromadb
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ["http://chromadb:8000/api/v2/heartbeat"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox_exporter:9115

  # Blackbox probe for the API — detects "process up but HTTP layer wedged" cases
  - job_name: blackbox_api
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://gaia-backend:80/health
          - https://api.heygaia.io/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox_exporter:9115
