apiVersion: 1

# Slack contact point. Set SLACK_ALERT_WEBHOOK_URL in the Grafana container's
# environment (via docker-compose .env) before enabling alerts in production.
contactPoints:
  - orgId: 1
    name: slack-alerts
    receivers:
      - uid: slack-alerts
        type: slack
        settings:
          # Uses Incoming Webhook mode. Set SLACK_ALERT_WEBHOOK_URL in the
          # Grafana container's environment (via .env) for real alerts.
          # The placeholder URL keeps Grafana in webhook mode so it boots
          # without a token — alerts simply won't deliver until a real URL
          # is configured.
          url: ${SLACK_ALERT_WEBHOOK_URL}
          recipient: "${SLACK_ALERT_CHANNEL}"
          title: "{{ template \"slack.default.title\" . }}"
          text: "{{ template \"slack.default.text\" . }}"
        disableResolveMessage: false
