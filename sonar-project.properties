sonar.projectKey=gaia
sonar.projectName=GAIA
sonar.projectVersion=1.0

# Source directories
sonar.sources=apps,libs,packages

# Language settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.python.version=3.11

# Exclusions - node_modules, build outputs, test files, generated files, assets
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/__tests__/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/.venv/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/migrations/**,\
  **/assets/**,\
  **/*.webp,\
  **/*.png,\
  **/*.jpg,\
  **/*.svg,\
  **/CHANGELOG.md,\
  apps/desktop/out/**,\
  apps/desktop/.next/**,\
  apps/web/.next/**,\
  apps/web/public/**,\
  apps/mobile/.expo/**,\
  infra/**,\
  **/.agents/**

# CPD (duplication) exclusions - large generated/data files
sonar.cpd.exclusions=\
  **/data/*Data.ts,\
  **/data/glossaryData.ts,\
  **/data/comparisonsData.ts,\
  **/data/personasData.ts

# Encoding
sonar.sourceEncoding=UTF-8
