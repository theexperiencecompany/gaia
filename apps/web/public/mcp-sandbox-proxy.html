<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light dark" />
    <style>
      html, body { margin: 0; height: 100vh; width: 100vw; background: transparent; display: flex; flex-direction: column; }
      iframe { border: none; flex-grow: 1; background: transparent; }
    </style>
  </head>
  <body>
    <script>
      var inner = document.createElement("iframe");
      inner.style.cssText = "width:100%;height:100%;border:none;";
      inner.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms");
      document.body.appendChild(inner);

      window.addEventListener("message", function(e) {
        if (e.source === window.parent) {
          if (e.data && e.data.method === "ui/notifications/sandbox-resource-ready") {
            var p = e.data.params || {};
            if (typeof p.sandbox === "string") inner.setAttribute("sandbox", p.sandbox);
            if (typeof p.html === "string") {
              var doc = inner.contentDocument || (inner.contentWindow && inner.contentWindow.document);
              if (doc) { doc.open(); doc.write(p.html); doc.close(); }
              else { inner.srcdoc = p.html; }
            }
          } else {
            inner.contentWindow && inner.contentWindow.postMessage(e.data, "*");
          }
        } else if (e.source === inner.contentWindow) {
          window.parent.postMessage(e.data, "*");
        }
      });

      window.parent.postMessage({ jsonrpc: "2.0", method: "ui/notifications/sandbox-proxy-ready", params: {} }, "*");
    </script>
  </body>
</html>
