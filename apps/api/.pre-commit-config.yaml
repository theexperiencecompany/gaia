repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        stages: [pre-commit]
        priority: 0
      - id: ruff-format
        stages: [pre-commit]
        priority: 0

  - repo: local
    hooks:
      - id: bandit
        name: Bandit Security Check
        language: system
        entry: uvx bandit -r app --exclude app/agents/prompts
        types: [python]
        pass_filenames: false
        priority: 0

      - id: pip-audit
        name: Pip Audit
        language: system
        entry: bash -c "uv export --no-dev --frozen --no-emit-header 2>/dev/null | uvx pip-audit --disable-pip --no-deps -r /dev/stdin"
        pass_filenames: false
        priority: 0

      - id: outbound-topology-parity
        name: Outbound topology parity (Python <-> TypeScript)
        language: system
        entry: python3 apps/api/scripts/check_outbound_topology_parity.py
        files: ^(apps/api/(app/models/chat_models\.py|scripts/check_outbound_topology_parity\.py)|libs/shared/ts/src/bots/consumer/topology\.ts)$
        pass_filenames: false
        priority: 0

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        files: ^apps/api/app/
        additional_dependencies:
          - types-redis
          - types-requests
          - types-pytz
          - types-croniter
        priority: 0
