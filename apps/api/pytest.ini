[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    # Suppress only known third-party false-positives; our own code's warnings must stay visible
    # mcp_use internal module re-organisation deprecations (not our code)
    ignore::DeprecationWarning:mcp_use:
    # PydanticDeprecatedSince20 triggered by mcp_use's own models (not our models)
    ignore:.*class-based `config` is deprecated.*:DeprecationWarning:mcp_use:
    # Pydantic UserWarning about renamed config key triggered by mcp_use models (pydantic internals)
    ignore:Valid config keys have changed in V2:UserWarning:
markers =
    unit: Unit tests (fast, no external deps)
    integration: Integration tests (compiled graphs, mocked services)
    e2e: End-to-end tests (real or near-real services)
    composio: Composio integration tests (require credentials)
    slow: Slow tests
addopts = -m "not e2e and not composio" --strict-markers
