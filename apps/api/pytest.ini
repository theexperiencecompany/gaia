[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
markers =
    unit: Unit tests (fast, no external deps)
    integration: Integration tests (compiled graphs, mocked services)
    e2e: End-to-end tests (real or near-real services)
    composio: Composio integration tests (require credentials)
    slow: Slow tests
addopts = -m "not e2e and not composio" --strict-markers
