[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::pydantic.warnings.PydanticDeprecatedSince20
    ignore::RuntimeWarning:asyncio
addopts = -m "not composio" --strict-markers -n 4
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    unit: Unit tests (fast, no external deps)
    integration: Integration tests (compiled graphs, mocked services)
    e2e: End-to-end tests (real or near-real services)
    composio: Composio integration tests (require credentials)
    slow: Slow tests

[coverage:run]
source = app
omit =
    app/config/*
    app/patches.py
    app/static/*

[coverage:report]
show_missing = true
fail_under = 20
exclude_lines =
    pragma: no cover
    if TYPE_CHECKING:
    if __name__ == .__main__.:
