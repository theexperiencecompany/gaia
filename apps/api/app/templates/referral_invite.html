<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>You've been invited to GAIA</title>
  </head>
  <body
    style="
      margin: 0;
      background-color: #f4f4f5;
      padding: 24px 16px;
      font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto,
        Helvetica, Arial, sans-serif;
      color: #18181b;
    "
  >
    <table
      align="center"
      width="100%"
      border="0"
      cellpadding="0"
      cellspacing="0"
      role="presentation"
      style="max-width: 440px; margin: 0 auto"
    >
      <tbody>
        <tr>
          <td
            style="
              background-color: #ffffff;
              border-radius: 16px;
              padding: 40px 32px;
              text-align: center;
            "
          >
            <!-- Referrer avatar -->
            {% if referrer_picture %}
            <img
              src="{{ referrer_picture }}"
              width="64"
              height="64"
              alt="{{ referrer_name }}"
              style="
                border-radius: 9999px;
                display: block;
                margin: 0 auto 24px;
              "
            />
            {% endif %}

            <!-- Hero -->
            <h1
              style="
                margin: 0 0 16px;
                font-size: 26px;
                font-weight: 700;
                line-height: 1.25;
                color: #18181b;
              "
            >
              You've been invited!
            </h1>

            <!-- One simple, warm sentence -->
            <p
              style="
                margin: 0 auto 28px;
                max-width: 340px;
                font-size: 16px;
                line-height: 26px;
                color: #52525b;
              "
            >
              Your friend {{ referrer_name }} gifted you
              <strong style="color: #18181b">{{ offer_label }}</strong> on GAIA
              PRO — your proactive AI assistant. Be sure to say thanks!
            </p>

            <!-- CTA -->
            <table
              align="center"
              border="0"
              cellpadding="0"
              cellspacing="0"
              role="presentation"
              style="margin: 0 auto"
            >
              <tbody>
                <tr>
                  <td
                    align="center"
                    style="border-radius: 12px; background-color: #00bbff"
                  >
                    <a
                      href="{{ invite_link }}"
                      target="_blank"
                      style="
                        display: inline-block;
                        padding: 14px 32px;
                        font-size: 16px;
                        font-weight: 600;
                        color: #000000;
                        text-decoration: none;
                        border-radius: 12px;
                      "
                      >Claim your gift</a
                    >
                  </td>
                </tr>
              </tbody>
            </table>
          </td>
        </tr>

        <!-- Footer: minimal unsubscribe (promotional-email requirement) -->
        <tr>
          <td style="padding: 18px 16px 0; text-align: center">
            <a
              href="mailto:{{ contact_email }}?subject=unsubscribe"
              style="font-size: 12px; color: #a1a1aa; text-decoration: underline"
              >Unsubscribe</a
            >
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
