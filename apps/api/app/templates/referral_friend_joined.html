<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>Your friend just joined GAIA</title>
  </head>
  <body
    style="
      margin: 0;
      background-color: #f4f4f5;
      padding: 24px 16px;
      font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto,
        Helvetica, Arial, sans-serif;
      color: #18181b;
    "
  >
    <table
      align="center"
      width="100%"
      border="0"
      cellpadding="0"
      cellspacing="0"
      role="presentation"
      style="max-width: 440px; margin: 0 auto"
    >
      <tbody>
        <tr>
          <td
            style="
              background-color: #ffffff;
              border-radius: 16px;
              padding: 40px 32px;
              text-align: center;
            "
          >
            <!-- Points badge -->
            <table
              align="center"
              border="0"
              cellpadding="0"
              cellspacing="0"
              role="presentation"
              style="margin: 0 auto 24px"
            >
              <tbody>
                <tr>
                  <td
                    align="center"
                    style="
                      background-color: #ecfeff;
                      border-radius: 9999px;
                      padding: 8px 16px;
                      font-size: 14px;
                      font-weight: 600;
                      color: #0e7490;
                    "
                  >
                    {{ points }} points
                  </td>
                </tr>
              </tbody>
            </table>

            <h1
              style="
                margin: 0 0 16px;
                font-size: 24px;
                font-weight: 700;
                line-height: 1.3;
                color: #18181b;
              "
            >
              {{ friend_name }} just joined GAIA
            </h1>

            <p
              style="
                margin: 0 auto 28px;
                max-width: 360px;
                font-size: 16px;
                line-height: 26px;
                color: #52525b;
              "
            >
              They signed up from your invite link. When {{ friend_name }}
              upgrades to <strong style="color: #18181b">GAIA Pro</strong>,
              you'll earn a free month of Pro — on us.
            </p>

            <table
              align="center"
              border="0"
              cellpadding="0"
              cellspacing="0"
              role="presentation"
              style="margin: 0 auto"
            >
              <tbody>
                <tr>
                  <td
                    align="center"
                    style="border-radius: 12px; background-color: #00bbff"
                  >
                    <a
                      href="{{ hub_link }}"
                      target="_blank"
                      style="
                        display: inline-block;
                        padding: 14px 32px;
                        font-size: 16px;
                        font-weight: 600;
                        color: #000000;
                        text-decoration: none;
                        border-radius: 12px;
                      "
                      >View your rewards</a
                    >
                  </td>
                </tr>
              </tbody>
            </table>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
