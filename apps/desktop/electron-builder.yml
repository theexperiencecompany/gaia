appId: io.heygaia.desktop
productName: GAIA
copyright: Copyright © 2024 The Experience Company
# Must match the electron devDependency in package.json. In a pnpm hoisted
# monorepo electron-builder's auto-detection is unreliable (it has resolved a
# stale 33.2.1 from cached metadata even with 39.8.10 installed), so pin the
# packaged runtime explicitly. Bump both together on every Electron upgrade.
electronVersion: 39.8.10
# In pnpm hoisted monorepos, electron-builder's dependency reinstall step can
# mutate workspace node_modules during packaging and break artifact generation.
npmRebuild: false

# Strip Chromium locale packs (~45MB) — the UI is web-rendered and ships its
# own i18n; only Electron-native menus would use these.
electronLanguages:
  - en

directories:
  output: release/${version}
  buildResources: resources

# Ad-hoc signs macOS builds when real signing is disabled — an unsigned
# bundle seal gets the app killed by RunningBoard on macOS 26 (see script).
afterSign: scripts/adhoc-sign.cjs

files:
  - out/**/*
  - "!out/renderer/**/*"
  - node_modules/**/*
  - "!node_modules/**/{test,tests,__tests__,testing}/**/*"
  - "!node_modules/**/*.{md,map,ts}"
  - "!node_modules/**/README*"
  - "!node_modules/**/CHANGELOG*"

asarUnpack:
  - "**/*.node"
  - "**/next-server/**/*"

extraResources:
  # Splash screen for fast startup
  - from: resources/splash.html
    to: splash.html
  # Experience Company logo for splash screen
  - from: resources/the_experience_company_white.webp
    to: the_experience_company_white.webp
  # Use .next-server-prepared which has dereferenced symlinks (created by scripts/prepare-next-server.sh)
  - from: .next-server-prepared
    to: next-server
    filter:
      - "**/*"
      - "!**/node_modules/.cache/**/*"

  # Window icon accessible at runtime via process.resourcesPath
  - from: resources/icons/256x256.png
    to: icons/256x256.png
  # Default dock icon + the switchable Arc-style icon set (settings page)
  - from: resources/icons/512x512.png
    to: icons/512x512.png
  - from: resources/app-icons
    to: app-icons

mac:
  category: public.app-category.productivity
  icon: resources/icons/icon.icns
  artifactName: "${productName}-${arch}.${ext}"
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  darkModeSupport: true
  # Custom protocol for OAuth deep linking
  extendInfo:
    CFBundleURLTypes:
      - CFBundleURLName: "GAIA Protocol"
        CFBundleURLSchemes:
          - gaia
    NSMicrophoneUsageDescription: 'GAIA listens for the "Hey GAIA" wake word so you can talk to your assistant hands-free.'
    NSAppleEventsUsageDescription: "GAIA opens apps and lists your windows when you ask it to use your computer."

dmg:
  # Bands-gradient brand wallpaper; background@2x.png alongside it is
  # picked up automatically for a retina TIFF.
  background: resources/dmg/background.png
  window:
    width: 540
    height: 380
  iconSize: 100
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  icon: resources/icons/icon.ico
  artifactName: "${productName}-${arch}.${ext}"
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
  # Custom protocol for OAuth deep linking
  protocols:
    - name: "GAIA Protocol"
      schemes:
        - gaia

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  deleteAppDataOnUninstall: true
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico

linux:
  icon: resources/icons
  artifactName: "${productName}-${arch}.${ext}"
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
  category: Utility
  synopsis: Your Personal AI Assistant
  description: GAIA is your personal AI assistant designed to help increase your productivity.
  # Custom protocol for OAuth deep linking
  mimeTypes:
    - x-scheme-handler/gaia
  desktop:
    MimeType: x-scheme-handler/gaia

publish:
  provider: github
  owner: theexperiencecompany
  repo: gaia
  releaseType: release
