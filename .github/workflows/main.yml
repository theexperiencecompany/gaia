name: Quality Checks

# Primary CI gate: validates code quality and enforces branch promotion policy.
on:
  # PR validation for both integration (develop) and production promotion (master).
  pull_request:
    branches:
      - develop
      - master
  # Push checks on master; successful runs trigger downstream build/deploy workflow.
  push:
    branches:
      - master
  # Manual trigger for ad-hoc CI execution.
  workflow_dispatch:

jobs:
  # Runs lint/type/build checks and enforces master branch workflow rules.
  quality-checks:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: read
      actions: read

    steps:
      # Full history improves Nx affected/base-head resolution.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Enforce that master only receives changes promoted from develop or release-please.
      - name: Enforce master promotion policy
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const isAllowedMasterSource = (ref) =>
              ref === "develop" || (typeof ref === "string" && ref.startsWith("release-please--"));

            const pr = context.payload.pull_request;
            if (pr.base.ref === "master" && !isAllowedMasterSource(pr.head.ref)) {
              core.setFailed(
                `PRs to master must come from develop or release-please branches. Received '${pr.head.ref}' -> '${pr.base.ref}'.`,
              );
              return;
            }
            core.info(`Master PR policy passed: ${pr.head.ref} -> ${pr.base.ref}`);

      # Pre-pull the Dagger engine image so it is in the Docker layer cache before
      # Dagger starts. Without this, cold Blacksmith VMs pull ~1 GB from
      # registry.dagger.io at engine startup, which exceeds Dagger's 10-minute
      # engine-start timeout and causes a SIGKILL. Retries handle transient failures.
      - name: Warm Dagger engine image
        run: |
          for i in 1 2 3; do
            docker pull registry.dagger.io/engine:v0.20.3 && break
            echo "Pull attempt $i failed, retrying in 15s..."
            sleep 15
          done
        timeout-minutes: 20

      # Run all quality checks via Dagger (lint, type-check, build, test, dead-code, release validation).
      # Everything runs inside the Dagger container -- no host toolchain setup needed.
      - name: Run quality checks
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "0.20.3"
          dagger-flags: "--silent"
          call: quality-checks
        timeout-minutes: 40

  # Only trigger image build/deploy planning on master after quality gate passes.
  trigger-build:
    needs: [quality-checks]
    if: github.ref == 'refs/heads/master'
    uses: ./.github/workflows/build.yml
    secrets: inherit # pragma: allowlist secret
