name: Quality Checks

# Primary CI gate: validates code quality and enforces branch promotion policy.
on:
  pull_request:
    branches:
      - develop
      - master
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  DAGGER_VERSION: "0.20.3"

jobs:
  # --- Detect affected projects -------------------------------------------
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      has_python: ${{ steps.affected.outputs.has_python }}
      has_typescript: ${{ steps.affected.outputs.has_typescript }}
      python_projects: ${{ steps.affected.outputs.python_projects }}
      typescript_projects: ${{ steps.affected.outputs.typescript_projects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce master promotion policy
        if: github.event_name == 'pull_request' && github.base_ref == 'master'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const isAllowed = (ref) =>
              ref === "develop" || ref.startsWith("release-please--");
            const pr = context.payload.pull_request;
            if (pr.base.ref === "master" && !isAllowed(pr.head.ref)) {
              core.setFailed(
                `PRs to master must come from develop or release-please. Got '${pr.head.ref}'.`
              );
            }

      - uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: develop

      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22.15.1"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Detect affected projects
        id: affected
        run: |
          # nx show projects may output JSON arrays or one-per-line depending on version/env.
          # Normalize both formats to comma-separated values.
          normalize() { tr -d '[]"' | tr -s ' \n' ',' | sed 's/^,//; s/,$//'; }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PY=$(npx nx show projects --projects 'tag:scope:python' 2>/dev/null | normalize || echo "")
            TS=$(npx nx show projects --projects 'tag:scope:typescript' 2>/dev/null | normalize || echo "")
          else
            PY=$(npx nx show projects --affected --projects 'tag:scope:python' 2>/dev/null | normalize || echo "")
            TS=$(npx nx show projects --affected --projects 'tag:scope:typescript' 2>/dev/null | normalize || echo "")
          fi

          echo "python_projects=$PY" >> "$GITHUB_OUTPUT"
          echo "typescript_projects=$TS" >> "$GITHUB_OUTPUT"
          echo "has_python=$([[ -n "$PY" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_typescript=$([[ -n "$TS" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

          echo "Affected Python:     $PY"
          echo "Affected TypeScript: $TS"

  # --- Static checks: Python (runner-native) ------------------------------
  static-python:
    needs: [detect]
    if: needs.detect.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22.15.1"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pip install --break-system-packages uv
      - name: Sync Python deps
        run: uv sync --frozen --package gaia --group backend --group dev
      - name: Ruff lint
        run: npx nx run-many -t lint -p ${{ needs.detect.outputs.python_projects }} --parallel=3
      - name: mypy
        working-directory: apps/api
        run: uv run mypy app --ignore-missing-imports

  # --- Static checks: TypeScript (runner-native) --------------------------
  static-typescript:
    needs: [detect]
    if: needs.detect.outputs.has_typescript == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22.15.1"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Biome lint
        run: npx nx run-many -t lint -p ${{ needs.detect.outputs.typescript_projects }} --parallel=3
      - name: TypeScript type-check
        run: npx nx run-many -t type-check -p ${{ needs.detect.outputs.typescript_projects }} --parallel=3

  # --- Build (runner-native, typescript only) -----------------------------
  build:
    needs: [detect]
    if: needs.detect.outputs.has_typescript == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22.15.1"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: npx nx run-many -t build -p ${{ needs.detect.outputs.typescript_projects }} --parallel=3
        env:
          NEXT_PUBLIC_API_BASE_URL: "http://fake-api-for-build.example.com"

  # --- Test: Python (Dagger -- needs service containers) ------------------
  test-python:
    needs: [detect]
    if: needs.detect.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - name: Run Python tests
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: ${{ env.DAGGER_VERSION }}
          dagger-flags: "--silent"
          call: test-python
        timeout-minutes: 18

  # --- Test: TypeScript (runner-native) -----------------------------------
  test-typescript:
    needs: [detect]
    if: needs.detect.outputs.has_typescript == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22.15.1"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run TypeScript tests
        run: npx nx run-many -t test -p ${{ needs.detect.outputs.typescript_projects }} --parallel=3
        env:
          ENV: test

  # --- Dead code analysis (runner-native) ---------------------------------
  dead-code:
    needs: [detect]
    if: needs.detect.outputs.has_python == 'true' || needs.detect.outputs.has_typescript == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22.15.1"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pip install --break-system-packages vulture
      - name: Dead code check
        shell: bash
        run: |
          export PATH="/home/runner/.local/bin:$PATH"
          bash scripts/dead-code-check.sh

  # --- Release validation (runner-native, always) -------------------------
  release-validation:
    needs: [detect]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22.15.1"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: node scripts/ci/validate-release-manifest.mjs

  # --- Changelog sync check (always) --------------------------------------
  changelog-sync:
    needs: [detect]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.15.1"
      - name: Regenerate changelog sub-pages
        run: node docs/scripts/generate-changelog-pages.js
      - name: Open fix PR if generated files are out of date
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          if [ -z "$(git status --porcelain --untracked-files=all docs/release-notes/)" ]; then
            echo "Changelog sub-pages are up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TARGET="$TARGET_REF"
          FIX_BRANCH="fix/changelog-sync-${TARGET//\//-}"

          git checkout -B "$FIX_BRANCH"
          git add docs/release-notes/
          git commit -m "chore(docs): regenerate changelog sub-pages"
          git push --force origin "$FIX_BRANCH"

          EXISTING_PR=$(gh pr list --head "$FIX_BRANCH" --base "$TARGET" --json url --jq '.[0].url')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --base "$TARGET" \
              --head "$FIX_BRANCH" \
              --title "chore(docs): regenerate changelog sub-pages" \
              --body "$(printf 'Changelog sub-pages were out of date on \`%s\`.\n\nThis PR was created automatically by the \`changelog-sync\` CI job. Merge it to fix the failing check.' "$TARGET")"
          else
            echo "Fix PR already open: $EXISTING_PR"
          fi

          echo "::error::Changelog sub-pages were out of date. A fix PR has been opened automatically — merge it to unblock CI."
          exit 1

  # --- Trivy scan (non-blocking) ------------------------------------------
  trivy-scan:
    needs: [detect]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          severity: "CRITICAL,HIGH"
          format: "table"
          scan-ref: "."

  # --- Coverage (master only, non-blocking) -------------------------------
  coverage:
    needs: [detect]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.detect.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - name: Run coverage
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: ${{ env.DAGGER_VERSION }}
          dagger-flags: "--silent"
          call: test-python-coverage
        timeout-minutes: 28

  # --- Quality gate (branch protection target) ----------------------------
  quality-gate:
    if: always()
    needs:
      - static-python
      - static-typescript
      - build
      - test-python
      - test-typescript
      - dead-code
      - release-validation
      - changelog-sync
      # trivy-scan deliberately excluded (non-blocking)
      # coverage deliberately excluded (master-only, non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate results
        run: |
          echo "Job results:"
          echo "  static-python:      ${{ needs.static-python.result }}"
          echo "  static-typescript:  ${{ needs.static-typescript.result }}"
          echo "  build:              ${{ needs.build.result }}"
          echo "  test-python:        ${{ needs.test-python.result }}"
          echo "  test-typescript:    ${{ needs.test-typescript.result }}"
          echo "  dead-code:          ${{ needs.dead-code.result }}"
          echo "  release-validation: ${{ needs.release-validation.result }}"
          echo "  changelog-sync:     ${{ needs.changelog-sync.result }}"

          for r in \
            "${{ needs.static-python.result }}" \
            "${{ needs.static-typescript.result }}" \
            "${{ needs.build.result }}" \
            "${{ needs.test-python.result }}" \
            "${{ needs.test-typescript.result }}" \
            "${{ needs.dead-code.result }}" \
            "${{ needs.release-validation.result }}" \
            "${{ needs.changelog-sync.result }}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::Required job result: $r"
              exit 1
            fi
          done
          echo "All required jobs passed or were skipped."

  # --- Trigger Docker build (master only) ---------------------------------
  # always() is required to suppress the implicit success() check, which walks
  # the transitive needs graph and returns false when any ancestor lane
  # (e.g. static-typescript / build / test-typescript on a Python-only change)
  # was skipped — even though quality-gate itself succeeded.
  trigger-build:
    needs: [quality-gate]
    if: ${{ always() && needs.quality-gate.result == 'success' && github.ref == 'refs/heads/master' }}
    uses: ./.github/workflows/build.yml
    secrets: inherit # pragma: allowlist secret
