name: Code Quality

# Tech-debt prevention gates that run on every PR to develop or master.
# Each lane is independent so failures are isolated and parallelised.
#
# Companion to .github/workflows/main.yml — that workflow handles
# correctness (build, type-check, tests, dead-code). This workflow
# enforces code-hygiene rules that prevent low-quality / LLM-generated
# code from accumulating in the repo.
on:
  pull_request:
    branches:
      - develop
      - master
  push:
    branches:
      - develop
      - master
  workflow_dispatch:

concurrency:
  group: code-quality-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # --- Biome lint + format (errors block; warnings allowed) ----------------
  biome:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Biome check
        run: pnpm run quality:lint

  # --- Workspace dependency hygiene -----------------------------------------
  deps:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: syncpack lint
        run: pnpm exec syncpack lint
      - name: manypkg check
        run: pnpm exec manypkg check
      - name: package.json lint
        run: pnpm run quality:pkg-json

  # --- Circular dependency check --------------------------------------------
  circular:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Madge circular deps
        run: pnpm run quality:circular

  # --- File size limit (per-extension + allowlist + hard cap) -------------
  file-size:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: File size check
        run: pnpm run quality:size

  # --- Types must live in dedicated type files -----------------------------
  types-location:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Type / interface / enum location
        run: node scripts/ci/check-types-location.mjs --enforce

  # --- Components-per-file (one component per file) ------------------------
  components-per-file:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: At most 2 components per file
        run: pnpm run quality:components

  # --- Copy-paste detection (strict; threshold lives in .jscpd.json) -------
  duplicates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: jscpd duplicate code report
        run: pnpm run quality:dupe

  # --- Type coverage (strict; threshold per workspace) ---------------------
  type-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Explicit-type coverage (per-workspace thresholds)
        run: pnpm run quality:type-coverage

  # --- Published package hygiene (publint + are-the-types-wrong) ----------
  package-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: publint (packages/cli)
        run: pnpm run quality:publint
      - name: are-the-types-wrong (packages/cli)
        run: pnpm run quality:attw

  # --- TypeScript type-check (all workspaces, strict) ---------------------
  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: tsc --noEmit (all workspaces)
        run: pnpm exec nx run-many -t type-check --projects=web,desktop,mobile,cli,bot-discord,bot-slack,bot-telegram,bot-whatsapp

  # --- Python ruff (strict rule set) --------------------------------------
  python-ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "latest"
          enable-cache: true
      - name: ruff check (strict rule set)
        run: uvx ruff check apps/api apps/voice-agent libs/shared/py
      - name: ruff format check
        run: uvx ruff format --check apps/api apps/voice-agent libs/shared/py

  # --- Python mypy (staged-strict) ----------------------------------------
  python-mypy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "latest"
          enable-cache: true
      - name: uv sync (api dev + backend)
        run: uv sync --project apps/api --group backend --group dev
      - name: mypy (api + voice-agent + shared)
        run: uv run --project apps/api --group backend --group dev mypy apps/api/app apps/voice-agent/src libs/shared/py --ignore-missing-imports

  # --- Python docstring coverage (interrogate) ----------------------------
  python-interrogate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "latest"
          enable-cache: true
      - name: interrogate (docstring coverage)
        run: uvx interrogate -c pyproject.toml apps/api apps/voice-agent libs/shared/py

  # --- Python complexity (xenon / radon) ----------------------------------
  python-xenon:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "latest"
          enable-cache: true
      - name: xenon cyclomatic complexity
        run: pnpm dlx --silent xenon@latest --max-absolute F --max-modules E --max-average B apps/api apps/voice-agent libs/shared/py -e 'apps/api/tests/**' -e 'apps/api/scripts/**' -e 'libs/shared/py/tests/**' || uvx xenon --max-absolute F --max-modules E --max-average B apps/api apps/voice-agent libs/shared/py -e 'apps/api/tests/**' -e 'apps/api/scripts/**' -e 'libs/shared/py/tests/**'

  # --- Python security (bandit + pip-audit) -------------------------------
  python-security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "latest"
          enable-cache: true
      - name: bandit (security lint)
        run: uvx bandit -r apps/api/app apps/voice-agent/src libs/shared/py --severity-level medium --confidence-level medium
      - name: pip-audit (dependency CVEs)
        continue-on-error: true
        run: uvx pip-audit --strict --skip-editable

  # --- Dead code detection (knip + vulture) — informational only ----------
  dead-code:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: knip + vulture dead-code report
        run: pnpm run quality:dead

  # --- Quality gate (single required status check) -------------------------
  quality-gate:
    if: always()
    needs:
      - biome
      - deps
      - circular
      - file-size
      - types-location
      - components-per-file
      - duplicates
      - type-coverage
      - package-hygiene
      - type-check
      - python-ruff
      - python-mypy
      - python-interrogate
      - python-xenon
      - python-security
      # dead-code is informational (continue-on-error)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate
        run: |
          echo "biome:               ${{ needs.biome.result }}"
          echo "deps:                ${{ needs.deps.result }}"
          echo "circular:            ${{ needs.circular.result }}"
          echo "file-size:           ${{ needs.file-size.result }}"
          echo "types-location:      ${{ needs.types-location.result }}"
          echo "components-per-file: ${{ needs.components-per-file.result }}"
          echo "duplicates:          ${{ needs.duplicates.result }}"
          echo "type-coverage:       ${{ needs.type-coverage.result }}"
          echo "package-hygiene:     ${{ needs.package-hygiene.result }}"
          echo "type-check:          ${{ needs.type-check.result }}"
          echo "python-ruff:         ${{ needs.python-ruff.result }}"
          echo "python-mypy:         ${{ needs.python-mypy.result }}"
          echo "python-interrogate:  ${{ needs.python-interrogate.result }}"
          echo "python-xenon:        ${{ needs.python-xenon.result }}"
          echo "python-security:     ${{ needs.python-security.result }}"

          for r in \
            "${{ needs.biome.result }}" \
            "${{ needs.deps.result }}" \
            "${{ needs.circular.result }}" \
            "${{ needs.file-size.result }}" \
            "${{ needs.types-location.result }}" \
            "${{ needs.components-per-file.result }}" \
            "${{ needs.duplicates.result }}" \
            "${{ needs.type-coverage.result }}" \
            "${{ needs.package-hygiene.result }}" \
            "${{ needs.type-check.result }}" \
            "${{ needs.python-ruff.result }}" \
            "${{ needs.python-mypy.result }}" \
            "${{ needs.python-interrogate.result }}" \
            "${{ needs.python-xenon.result }}" \
            "${{ needs.python-security.result }}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::Required quality job result: $r"
              exit 1
            fi
          done
          echo "All quality gates passed."
